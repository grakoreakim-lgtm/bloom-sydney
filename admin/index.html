<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bloom Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="admin.css"/>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <h1>Bloom Admin</h1>
    <p class="sub">Sign in to manage products, orders, and store settings.</p>
    <form id="login-form">
      <input name="email"    type="email"    placeholder="Email"    required autocomplete="email"/>
      <input name="password" type="password" placeholder="Password" required autocomplete="current-password"/>
      <div class="login-err" id="login-err"></div>
      <button type="submit">Sign in</button>
    </form>
  </div>
</div>

<!-- ══════════════════ APP SHELL ══════════════════ -->
<div id="admin-app" hidden>
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <span class="brand-name">Bloom</span>
      <span class="brand-sub">Admin</span>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-link" href="#/dashboard" data-route="dashboard"><span>📊</span> Dashboard</a>
      <a class="nav-link" href="#/orders"    data-route="orders"><span>🛒</span> Orders</a>
      <a class="nav-link" href="#/customers" data-route="customers"><span>👥</span> Customers</a>
      <a class="nav-link" href="#/products"  data-route="products"><span>🌸</span> Products</a>
      <a class="nav-link" href="#/settings"  data-route="settings"><span>⚙️</span> Settings</a>
    </nav>
    <div class="sidebar-foot">
      <div class="user-email" id="signed-in-as"></div>
      <button class="btn-logout" id="btn-logout">Sign out</button>
    </div>
  </aside>

  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <main class="content">
    <header class="topbar">
      <button class="btn-menu" id="btn-menu" aria-label="Open menu">☰</button>
      <h1 class="view-title" id="view-title">Dashboard</h1>
    </header>
    <div class="view-container" id="view-container"></div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module" src="admin.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Bloom Admin · 상품 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #F9F6F2;
  --surface:   #ffffff;
  --ink:       #1A1A1A;
  --mid:       #4A4A4A;
  --subtle:    #767676;
  --border:    #E0DBD4;
  --accent:    #6B2D20;
  --accent-h:  #7E3525;
  --danger:    #B23B2D;
  --success:   #3D5C3D;
  --r:         8px;
  --shadow:    0 2px 8px rgba(0,0,0,.04);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
}
[hidden] { display: none !important; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; font-size: 14px; }

/* ── Login ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 36px 32px;
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow);
}
.login-card h1 {
  font-size: 22px; margin: 0 0 6px; font-weight: 700;
}
.login-card .sub {
  color: var(--subtle); font-size: 13px; margin: 0 0 24px;
}
#login-form { display: flex; flex-direction: column; gap: 14px; }
#login-form input {
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--bg);
}
#login-form input:focus { outline: none; border-color: var(--accent); }
#login-form button {
  margin-top: 6px;
  padding: 13px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: var(--r);
  font-weight: 600;
  letter-spacing: .04em;
  transition: background .2s;
}
#login-form button:hover { background: var(--accent); }
#login-form button:disabled { opacity: .5; cursor: not-allowed; }
.login-err {
  background: #FCEAE7;
  color: var(--danger);
  padding: 10px 12px;
  border-radius: var(--r);
  font-size: 13px;
  display: none;
}
.login-err.show { display: block; }

/* ── App layout ── */
header.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand { font-weight: 700; font-size: 16px; letter-spacing: -0.01em; }
.brand small { color: var(--subtle); font-weight: 400; margin-left: 8px; }
.user-info { display: flex; align-items: center; gap: 12px; font-size: 13px; }
.user-info .email { color: var(--subtle); }
.btn-logout {
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-size: 13px;
  color: var(--mid);
}
.btn-logout:hover { border-color: var(--ink); color: var(--ink); }

main.app-main {
  max-width: 960px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}

/* ── Tabs ── */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 20px;
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  background: var(--surface);
  width: fit-content;
}
.tab {
  padding: 10px 22px;
  background: transparent;
  border: none;
  font-size: 14px;
  font-weight: 600;
  color: var(--mid);
  transition: all .2s;
}
.tab.on { background: var(--ink); color: #fff; }

/* ── Action bar ── */
.action-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  flex-wrap: wrap;
  gap: 10px;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 11px 18px;
  border-radius: var(--r);
  font-size: 14px;
  font-weight: 600;
  transition: background .2s;
}
.btn-primary:hover { background: var(--accent-h); }
.helper-text { color: var(--subtle); font-size: 13px; }

/* ── Product list ── */
#product-list { display: flex; flex-direction: column; gap: 10px; }
.prow {
  display: grid;
  grid-template-columns: 60px 1fr auto;
  gap: 14px;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
}
.prow .thumb {
  width: 60px; height: 60px;
  border-radius: 6px;
  object-fit: cover;
  background: var(--bg);
}
.prow .pname { font-weight: 600; font-size: 15px; }
.prow .ptype { color: var(--subtle); font-size: 11px; letter-spacing: .12em; text-transform: uppercase; margin-top: 2px; }
.prow .pmeta { font-size: 13px; color: var(--mid); margin-top: 4px; }
.prow .pmeta .sold-tag { color: var(--danger); font-weight: 600; }
.prow .actions { display: flex; gap: 6px; }
.prow .actions button {
  padding: 7px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 13px;
  color: var(--mid);
}
.prow .actions .btn-edit:hover { border-color: var(--ink); color: var(--ink); }
.prow .actions .btn-del:hover { border-color: var(--danger); color: var(--danger); }

.empty {
  text-align: center;
  padding: 50px 20px;
  color: var(--subtle);
  background: var(--surface);
  border: 1px dashed var(--border);
  border-radius: var(--r);
}

.loading {
  text-align: center;
  padding: 30px;
  color: var(--subtle);
}

/* ── Form modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.4);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 30px 16px;
  overflow-y: auto;
  z-index: 100;
}
.modal {
  background: var(--surface);
  border-radius: 12px;
  width: 100%;
  max-width: 520px;
  padding: 28px;
  box-shadow: 0 10px 40px rgba(0,0,0,.15);
}
.modal h2 { margin: 0 0 20px; font-size: 19px; font-weight: 700; }
.field { margin-bottom: 14px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width: 480px) { .field-row { grid-template-columns: 1fr; } }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--subtle);
  margin-bottom: 6px;
}
.field input[type=text],
.field input[type=number],
.field select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
}
.field input:focus,
.field select:focus { outline: none; border-color: var(--accent); }
.field-check {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; color: var(--ink);
}
.field-check input { margin: 0; }

.image-drop {
  border: 2px dashed var(--border);
  border-radius: var(--r);
  padding: 20px;
  text-align: center;
  background: var(--bg);
  cursor: pointer;
  transition: border-color .2s;
}
.image-drop:hover, .image-drop.over { border-color: var(--accent); }
.image-drop input[type=file] { display: none; }
.image-drop .hint { color: var(--subtle); font-size: 13px; }
.image-preview {
  margin-top: 10px;
  display: flex; gap: 10px; align-items: center;
}
.image-preview img {
  width: 80px; height: 80px; object-fit: cover; border-radius: 6px;
  border: 1px solid var(--border);
}
.image-preview .ipname { font-size: 12px; color: var(--subtle); }

.modal-footer {
  margin-top: 22px;
  display: flex;
  justify-content: flex-end;
  gap: 10px;
}
.btn-secondary {
  padding: 11px 18px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  font-size: 14px;
  color: var(--mid);
}
.btn-secondary:hover { border-color: var(--ink); color: var(--ink); }
.btn-save {
  padding: 11px 22px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: var(--r);
  font-size: 14px;
  font-weight: 600;
}
.btn-save:hover { background: var(--accent); }
.btn-save:disabled { opacity: .6; cursor: not-allowed; }

.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: #fff;
  padding: 12px 22px;
  border-radius: 999px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  z-index: 200;
}
.toast.on { opacity: 1; }
.toast.err { background: var(--danger); }
</style>
</head>
<body>

<!-- ══════════════════ LOGIN ══════════════════ -->
<div id="login-screen">
  <div class="login-card">
    <h1>Bloom Admin</h1>
    <p class="sub">상품을 등록하려면 로그인하세요.</p>
    <form id="login-form">
      <input name="email" type="email" placeholder="이메일" required autocomplete="email"/>
      <input name="password" type="password" placeholder="비밀번호" required autocomplete="current-password"/>
      <div class="login-err" id="login-err"></div>
      <button type="submit">로그인</button>
    </form>
  </div>
</div>

<!-- ══════════════════ APP ══════════════════ -->
<div id="admin-app" hidden>
  <header class="topbar">
    <div class="brand">Bloom Admin <small>상품 관리</small></div>
    <div class="user-info">
      <span class="email" id="signed-in-as"></span>
      <button class="btn-logout" id="btn-logout">로그아웃</button>
    </div>
  </header>

  <main class="app-main">
    <div class="tabs">
      <button class="tab on" data-tab="sameday">Same-Day</button>
      <button class="tab" data-tab="preorder">Pre-Order</button>
    </div>

    <div class="action-bar">
      <span class="helper-text">현재 탭에 노출될 상품을 관리합니다. 사진/이름/가격을 입력하면 고객 페이지에 즉시 반영됩니다.</span>
      <button class="btn-primary" id="btn-add">+ 새 상품 추가</button>
    </div>

    <div id="product-list" class="loading">불러오는 중...</div>
  </main>
</div>

<!-- ══════════════════ FORM MODAL ══════════════════ -->
<div class="modal-overlay" id="form-modal" hidden>
  <div class="modal">
    <h2 id="form-title">새 상품 추가</h2>
    <form id="product-form">

      <div class="field-row">
        <div class="field">
          <label>탭</label>
          <select name="tab">
            <option value="sameday">Same-Day (오늘 배송)</option>
            <option value="preorder">Pre-Order (예약 주문)</option>
          </select>
        </div>
        <div class="field">
          <label>라벨 / 태그</label>
          <input name="type" type="text" placeholder="예: TODAY · CARLINGFORD" required/>
        </div>
      </div>

      <div class="field">
        <label>상품명</label>
        <input name="name" type="text" placeholder="예: White Tulip Bunch" required/>
      </div>

      <div class="field">
        <label>와인 페어링 설명 (선택)</label>
        <input name="pair" type="text" placeholder="예: Hunter Valley Rosé"/>
      </div>

      <div class="field-row">
        <div class="field">
          <label>가격 ($)</label>
          <input name="price" type="number" min="0" step="1" required/>
        </div>
        <div class="field">
          <label>와인 포함 가격 ($, 선택)</label>
          <input name="wine" type="number" min="0" step="1"/>
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label>재고 수량</label>
          <input name="stock" type="number" min="0" step="1" required value="0"/>
        </div>
        <div class="field" style="display:flex; flex-direction:column; gap:6px; padding-top:18px;">
          <label class="field-check"><input name="hasWine" type="checkbox"/> 와인 페어링 뱃지 표시</label>
          <label class="field-check"><input name="sold" type="checkbox"/> 품절 처리</label>
        </div>
      </div>

      <div class="field">
        <label>꽃 사진</label>
        <label class="image-drop" id="image-drop">
          <input name="image" type="file" accept="image/*"/>
          <div class="hint">클릭해서 사진 선택 (또는 드래그앤드롭)<br/>JPG/PNG, 1MB 이하 권장</div>
          <div class="image-preview" id="image-preview" hidden></div>
        </label>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn-secondary" id="btn-cancel">취소</button>
        <button type="submit" class="btn-save" id="btn-save">저장</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDoc, getDocs, query, orderBy, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject }
  from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";
import { firebaseConfig } from "../firebase/web-config.js";

const app     = initializeApp(firebaseConfig);
const auth    = getAuth(app);
const db      = getFirestore(app);
const storage = getStorage(app);

let currentTab = 'sameday';
let editingId  = null;
let pendingFile = null;

const $ = (s) => document.querySelector(s);

/* ─── TOAST ─── */
let toastT;
function toast(msg, isErr=false) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.toggle('err', isErr);
  el.classList.add('on');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('on'), 3200);
}

/* ─── AUTH ─── */
onAuthStateChanged(auth, user => {
  if (user) {
    $('#login-screen').hidden = true;
    $('#admin-app').hidden = false;
    $('#signed-in-as').textContent = user.email;
    loadProducts();
  } else {
    $('#login-screen').hidden = false;
    $('#admin-app').hidden = true;
  }
});

$('#login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = $('#login-err');
  errEl.classList.remove('show');
  const btn = e.target.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = '로그인 중...';
  try {
    await signInWithEmailAndPassword(auth, e.target.email.value, e.target.password.value);
  } catch (err) {
    errEl.textContent = '로그인 실패: ' + (err.code || err.message);
    errEl.classList.add('show');
  } finally {
    btn.disabled = false; btn.textContent = '로그인';
  }
});

$('#btn-logout').addEventListener('click', () => signOut(auth));

/* ─── TAB SWITCH ─── */
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('on', b === btn));
    loadProducts();
  });
});

/* ─── LOAD PRODUCTS ─── */
async function loadProducts() {
  const list = $('#product-list');
  list.className = 'loading';
  list.innerHTML = '불러오는 중...';
  try {
    const snap = await getDocs(query(collection(db, 'products'), orderBy('sortOrder', 'asc')));
    const items = [];
    snap.forEach(d => {
      const data = d.data();
      if ((data.tab || 'sameday') === currentTab) items.push({ id: d.id, ...data });
    });
    list.className = '';
    if (!items.length) {
      list.innerHTML = '<div class="empty">아직 등록된 상품이 없습니다.<br/>오른쪽 위 <strong>+ 새 상품 추가</strong> 를 눌러 시작하세요.</div>';
      return;
    }
    list.innerHTML = items.map(p => `
      <div class="prow">
        <img class="thumb" src="${p.imageUrl || ''}" alt="${escapeHtml(p.name)}"/>
        <div>
          <div class="pname">${escapeHtml(p.name)}</div>
          <div class="ptype">${escapeHtml(p.type || '')}</div>
          <div class="pmeta">
            $${p.price}${p.wine ? ' · 와인포함 $' + p.wine : ''}
            · ${p.sold ? '<span class="sold-tag">SOLD OUT</span>' : (p.stock + ' available')}
          </div>
        </div>
        <div class="actions">
          <button class="btn-edit" data-id="${p.id}">수정</button>
          <button class="btn-del"  data-id="${p.id}" data-path="${p.imagePath || ''}">삭제</button>
        </div>
      </div>
    `).join('');
    list.querySelectorAll('.btn-edit').forEach(b =>
      b.addEventListener('click', () => editProduct(b.dataset.id)));
    list.querySelectorAll('.btn-del').forEach(b =>
      b.addEventListener('click', () => deleteProduct(b.dataset.id, b.dataset.path)));
  } catch (err) {
    list.className = '';
    list.innerHTML = `<div class="empty">불러오기 실패: ${escapeHtml(err.message)}<br/><small>Firestore 보안 규칙이 적용됐는지 확인해주세요.</small></div>`;
    console.error(err);
  }
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ─── FORM OPEN ─── */
$('#btn-add').addEventListener('click', () => openForm(null));

async function editProduct(id) {
  try {
    const snap = await getDoc(doc(db, 'products', id));
    if (snap.exists()) openForm({ id: snap.id, ...snap.data() });
  } catch (err) {
    toast('상품 불러오기 실패: ' + err.message, true);
  }
}

function openForm(product) {
  editingId = product?.id || null;
  pendingFile = null;
  const form = $('#product-form');
  form.reset();
  $('#form-title').textContent = product ? '상품 수정' : '새 상품 추가';
  const preview = $('#image-preview');
  preview.hidden = true; preview.innerHTML = '';

  if (product) {
    form.tab.value = product.tab || 'sameday';
    form.type.value = product.type || '';
    form.name.value = product.name || '';
    form.pair.value = product.pair || '';
    form.price.value = product.price ?? '';
    form.wine.value  = product.wine  ?? '';
    form.stock.value = product.stock ?? 0;
    form.hasWine.checked = !!product.hasWine;
    form.sold.checked    = !!product.sold;
    if (product.imageUrl) {
      preview.hidden = false;
      preview.innerHTML = `<img src="${product.imageUrl}"/><span class="ipname">현재 이미지 (새로 업로드하면 교체됩니다)</span>`;
    }
    form.dataset.imageUrl  = product.imageUrl  || '';
    form.dataset.imagePath = product.imagePath || '';
    form.dataset.sortOrder = product.sortOrder ?? 0;
  } else {
    form.tab.value = currentTab;
    form.dataset.imageUrl  = '';
    form.dataset.imagePath = '';
    form.dataset.sortOrder = '';
  }
  $('#form-modal').hidden = false;
}

$('#btn-cancel').addEventListener('click', () => $('#form-modal').hidden = true);

/* ─── IMAGE UPLOAD UX ─── */
const drop = $('#image-drop');
const fileInput = drop.querySelector('input[type=file]');

fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

['dragenter','dragover'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});

function handleFile(file) {
  if (!file) return;
  if (!file.type.startsWith('image/')) { toast('이미지 파일만 업로드 가능합니다.', true); return; }
  pendingFile = file;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const preview = $('#image-preview');
    preview.hidden = false;
    preview.innerHTML = `<img src="${ev.target.result}"/><span class="ipname">${escapeHtml(file.name)} (${(file.size/1024).toFixed(0)} KB)</span>`;
  };
  reader.readAsDataURL(file);
}

/* ─── FORM SUBMIT ─── */
$('#product-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = e.target;
  const saveBtn = $('#btn-save');
  saveBtn.disabled = true; saveBtn.textContent = '저장 중...';
  try {
    let imageUrl  = form.dataset.imageUrl  || '';
    let imagePath = form.dataset.imagePath || '';

    if (pendingFile) {
      saveBtn.textContent = '이미지 업로드 중...';
      const safeName = pendingFile.name.replace(/[^\w.-]/g, '_');
      const newPath = `products/${Date.now()}_${safeName}`;
      const r = ref(storage, newPath);
      await uploadBytes(r, pendingFile);
      const newUrl = await getDownloadURL(r);
      // Delete previous file if replacing
      if (imagePath && imagePath !== newPath) {
        try { await deleteObject(ref(storage, imagePath)); } catch (err) { /* ignore */ }
      }
      imageUrl = newUrl;
      imagePath = newPath;
    }

    if (!imageUrl) {
      toast('사진을 등록해주세요.', true);
      saveBtn.disabled = false; saveBtn.textContent = '저장';
      return;
    }

    const data = {
      tab:     form.tab.value,
      type:    form.type.value.trim(),
      name:    form.name.value.trim(),
      pair:    form.pair.value.trim(),
      price:   Number(form.price.value),
      stock:   Number(form.stock.value),
      hasWine: form.hasWine.checked,
      sold:    form.sold.checked,
      imageUrl,
      imagePath,
      sortOrder: form.dataset.sortOrder !== '' ? Number(form.dataset.sortOrder) : Date.now(),
      updatedAt: serverTimestamp(),
    };
    if (form.wine.value !== '') data.wine = Number(form.wine.value);

    saveBtn.textContent = '저장 중...';
    if (editingId) {
      await updateDoc(doc(db, 'products', editingId), data);
      toast('수정 완료');
    } else {
      data.createdAt = serverTimestamp();
      await addDoc(collection(db, 'products'), data);
      toast('새 상품이 등록됐습니다');
    }
    $('#form-modal').hidden = true;
    loadProducts();
  } catch (err) {
    console.error(err);
    toast('저장 실패: ' + (err.code || err.message), true);
  } finally {
    saveBtn.disabled = false; saveBtn.textContent = '저장';
  }
});

/* ─── DELETE ─── */
async function deleteProduct(id, imagePath) {
  if (!confirm('이 상품을 삭제하시겠습니까? 되돌릴 수 없습니다.')) return;
  try {
    await deleteDoc(doc(db, 'products', id));
    if (imagePath) {
      try { await deleteObject(ref(storage, imagePath)); } catch (err) { /* ignore missing */ }
    }
    toast('삭제 완료');
    loadProducts();
  } catch (err) {
    toast('삭제 실패: ' + (err.code || err.message), true);
  }
}
</script>
</body>
</html>
